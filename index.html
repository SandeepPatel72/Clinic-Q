
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinic-Q - OPD Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    @keyframes borderGlow {
      0%, 100% {
        box-shadow: 0 0 5px rgba(99, 102, 241, 0.2);
      }
      50% {
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
      }
    }
    .animate-radium-glow {
      animation: borderGlow 2s infinite ease-in-out;
    }
    @keyframes activeBorderGlow {
      0%, 100% {
        box-shadow: 0 0 8px rgba(99, 102, 241, 0.3), 0 0 2px rgba(99, 102, 241, 0.2);
        border-color: rgba(99, 102, 241, 0.5);
      }
      50% {
        box-shadow: 0 0 20px rgba(99, 102, 241, 0.7), 0 0 6px rgba(99, 102, 241, 0.4);
        border-color: rgba(99, 102, 241, 0.9);
      }
    }
    @keyframes activeGradientShift {
      0%, 100% {
        background-color: rgba(255, 255, 255, 1);
      }
      50% {
        background-color: rgba(238, 242, 255, 1);
      }
    }
    .animate-active-glow {
      animation: activeBorderGlow 2s infinite ease-in-out, activeGradientShift 3s infinite ease-in-out;
      border-color: rgba(99, 102, 241, 0.6);
    }
    /* Smooth Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden h-screen selection:bg-indigo-100 selection:text-indigo-900">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
